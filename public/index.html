<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES-CTR 文件加密工具</title>
    <style>
        :root {
            --primary: #7c3aed;
            /* 紫色主题区分 GCM */
            --bg: #f5f3ff;
            --card: #ffffff;
            --text: #1e1b4b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            border: 1px solid #ddd6fe;
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .warning {
            background-color: #fef3c7;
            color: #92400e;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #f59e0b;
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input[type="file"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #c4b5fd;
            border-radius: 6px;
            box-sizing: border-box;
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #6d28d9;
        }

        button:disabled {
            background-color: #a78bfa;
            cursor: not-allowed;
        }

        .status {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .status.success {
            background-color: #dcfce7;
            color: #166534;
            display: block;
        }

        .status.error {
            background-color: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .status.loading {
            background-color: #e0e7ff;
            color: #3730a3;
            display: block;
        }

        #decrypt-section {
            display: none;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background-color: #28a745;
            transition: width 0.2s;
        }

        #status {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5/js/md5.min.js"></script>
</head>

<body>

    <div class="container">
        <h1>🔐 AES-CTR 加密工具</h1>

        <div class="warning">
            <strong>注意：</strong> CTR 模式不提供完整性校验。如果密码错误，解密将生成乱码文件且不会报错。请妥善保管密码。
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('encrypt')">加密</div>
            <div class="tab" onclick="switchTab('decrypt')">解密</div>
        </div>

        <!-- 加密区域 -->
        <div id="encrypt-section">
            <div class="form-group">
                <label>选择文件</label>
                <input type="file" id="encrypt-file-input" multiple>
            </div>
            <div class="form-group">
                <label>设置密码</label>
                <input type="text" id="encrypt-password" placeholder="建议至少8位字符">
            </div>
            <button onclick="processEncryption()" id="btn-encrypt">加密并下载 (.ctr)</button>
        </div>

        <!-- 解密区域 -->
        <div id="decrypt-section">
            <div class="form-group">
                <label>选择加密文件 (.ctr)</label>
                <input type="file" id="decrypt-file-input">
            </div>
            <div class="form-group">
                <label>输入密码</label>
                <input type="text" id="decrypt-password" placeholder="输入解密密码">
            </div>
            <button onclick="processDecryption()" id="btn-decrypt">解密并下载</button>
        </div>

        <div id="status-msg" class="status"></div>

        <div id="progress-container">
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="status">准备中...</div>
        </div>
    </div>

    <script>
        // --- 核心 AES-CTR 逻辑 ---
        // 辅助函数：ArrayBuffer 转 Hex 字符串
        function bufferToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }
        // 2. 转换函数
        function hexToUint8Array(hex) {
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) {
                bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
            }
            return bytes;
        }

        // 2. 转换函数
        function md5Utils(str) {
            return hexToUint8Array(md5(str + ''))
        }

        function updateProgress(percent, text) {
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('status').innerText = text;
        }

        // 1. 从密码派生密钥 (PBKDF2)
        async function deriveKey(password, sizeSalt) {
            sizeSalt = sizeSalt + ''
            const enc = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                { name: "PBKDF2" },
                false,
                ["deriveBits", "deriveKey"]
            );
            // 生成16字节数据。
            const keyLength = 16
            const passwdBit = await window.crypto.subtle.deriveBits(
                {
                    name: "PBKDF2",
                    salt: enc.encode('AES-CTR'),
                    iterations: 1000,
                    hash: "SHA-256"
                },
                keyMaterial,
                keyLength * 8
            );
            const passwdOutward = bufferToHex(passwdBit)
            const passkey = md5Utils(passwdOutward + sizeSalt)
            console.log('@@passkey-md5', passwdOutward + sizeSalt, passwdOutward, passkey)
            const aesctr = await window.crypto.subtle.importKey(
                "raw",                      // 格式：原始字节流
                passkey,                    // 数据：密码的字节数组
                { name: "AES-CTR", length: 128 },       // 算法：声明这个材料将用于 AES-CTR 算法
                false,                    // 不可导出：安全起见，不允许把这个中间材料再变回字节数组
                ["encrypt", "decrypt"]
            );
            return aesctr
        }

        // 2. 读取 Blob 为 ArrayBuffer
        async function readFileAsArrayBuffer(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(blob);
            });
        }

        function createReadableStream(key, iv, file) {
            // 3. 准备输出流 (使用 Stream API 实现真正的流式下载，不占内存)
            // 注意：这里我们构建一个自定义的 ReadableStream
            const stream = new ReadableStream({
                async start(controller) {
                    try {
                        // 3.2 分片读取并加密文件
                        const CHUNK_SIZE = 1024 * 1024 * 10; // 1MB 分片，字节必须要是16的倍数，因为处理position需要除以16
                        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
                        for (let i = 0; i < totalChunks; i++) {
                            updateProgress(Math.floor(i / totalChunks * 100), '下载中');
                            const start = i * CHUNK_SIZE;
                            const end = Math.min(start + CHUNK_SIZE, file.size);
                            const chunkBlob = file.slice(start, end);

                            // 读取分片为 ArrayBuffer
                            const chunkBuffer = await readFileAsArrayBuffer(chunkBlob);

                            // 加密当前分片
                            const encryptedChunk = await encryptChunk(key, iv, start, chunkBuffer);

                            // 将加密后的数据推入流
                            controller.enqueue(encryptedChunk);

                            // 更新进度
                            const percent = 5 + ((i + 1) / totalChunks) * 95;
                            updateProgress(percent, `加密中... ${((i + 1) / totalChunks * 100).toFixed(1)}%`);
                        }

                        controller.close(); // 结束流
                    } catch (err) {
                        controller.error(err);
                        console.error(err);
                    }
                }
            });
            return stream
        }
        // nonce: Uint8Array, increment int
        function incrementIV(nonce, increment) {
            const iv = new DataView(nonce.buffer)
            const MAX_UINT32 = 0xffffffff
            const incrementBig = ~~(increment / MAX_UINT32)
            const incrementLittle = (increment % MAX_UINT32) - incrementBig
            // split the 128bits IV in 4 numbers, 32bits each
            let overflow = 0
            for (let idx = 0; idx < 4; ++idx) {
                let num = iv.getUint32(12 - idx * 4)
                let inc = overflow
                if (idx === 0) inc += incrementLittle
                if (idx === 1) inc += incrementBig
                num += inc
                const numBig = ~~(num / MAX_UINT32)
                const numLittle = (num % MAX_UINT32) - numBig
                overflow = numBig
                iv.setUint32(12 - idx * 4, numLittle)
            }
            return iv.buffer
        }
        // 确保chunkIndex是 16倍数，如果不是的话，需要去掉前面的几个字节
        async function encryptChunk(passkey, iv, chunkIndex, fileData) {
            const increment = Math.floor(chunkIndex / 16)
            let nonce = iv
            if (increment) {
                nonce = incrementIV(iv, increment)
            }
            // 执行 AES-CTR 加密
            const encryptedContent = await window.crypto.subtle.encrypt(
                {
                    name: "AES-CTR",
                    counter: nonce,
                    length: 64 // 计数器长度，通常为 64 或 128
                },
                passkey,
                fileData
            );
            console.log('@@@encryptChunk fileData', chunkIndex, bufferToHex(nonce), encryptedContent)
            return new Uint8Array(encryptedContent)
        }

        // 3. 加密过程
        async function processEncryption() {
            const fileInput = document.getElementById('encrypt-file-input');
            const password = document.getElementById('encrypt-password').value;
            const btn = document.getElementById('btn-encrypt');

            if (!fileInput.files.length) return showStatus('请选择文件', 'error');
            if (!password) return showStatus('请输入密码', 'error');

            try {
                btn.disabled = true;
                const file = fileInput.files[0];
                const fileData = await file.arrayBuffer();
                // const fileData = new Uint8Array(32).fill(1)
                console.log('正在加密...', 'loading', file.size, typeof fileData);
                // 获取密钥
                const passkey = await deriveKey(password, file.size);
                // 生成随机 Salt (16字节) 和 Nonce (8字节)
                const nonce = md5Utils(file.size + '')

                console.log('@@key-enc', passkey)
                const stream = createReadableStream(passkey, nonce, file)

                const response = new Response(stream);
                const blob = await response.blob();

                console.log('@@密文', bufferToHex(blob))
                // 组合文件: [Salt 16] + [Nonce 8] + [Encrypted Data]
                // 注意：这里我们只存 8 字节的 Nonce，因为后 8 字节计数器固定为 0
                // const blob = new Blob([encryptedContent], { type: "application/octet-stream" });
                downloadFile(blob, file.name + ".ctr");
                showStatus('加密成功！', 'success');
            } catch (e) {
                console.error(e);
                showStatus('加密失败: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // 4. 解密过程
        async function processDecryption() {
            const fileInput = document.getElementById('decrypt-file-input');
            const password = document.getElementById('decrypt-password').value;
            const btn = document.getElementById('btn-decrypt');

            if (!fileInput.files.length) return showStatus('请选择加密文件', 'error');
            if (!password) return showStatus('请输入密码', 'error');

            try {
                showStatus('正在解密...', 'loading');
                btn.disabled = true;

                const file = fileInput.files[0];
                const fileData = await file.arrayBuffer();

                // 提取 Salt (前16字节) 和 Nonce (接下来8字节)
                const salt = fileData.slice(0, 16);
                const nonce = fileData.slice(16, 24);
                const data = fileData.slice(24);

                // 获取密钥
                const key = await deriveKey(password, new Uint8Array(salt));
                console.log('@@key-dec', key)
                // 重建计数器块
                const counterBlock = createCounterBlock(new Uint8Array(nonce));

                // 执行 AES-CTR 解密
                // 注意：CTR 解密不会报错，即使密码错误也会输出乱码
                const decryptedContent = await window.crypto.subtle.decrypt(
                    {
                        name: "AES-CTR",
                        counter: counterBlock,
                        length: 64
                    },
                    key,
                    data
                );

                const originalName = file.name.replace(/\.ctr$/, '');
                const blob = new Blob([decryptedContent], { type: "application/octet-stream" });

                downloadFile(blob, originalName);
                showStatus('解密完成！请检查文件内容是否正确', 'success');
            } catch (e) {
                console.error(e);
                showStatus('解密过程出错: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // --- 辅助函数 ---

        function switchTab(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${mode}')"]`).classList.add('active');

            if (mode === 'encrypt') {
                document.getElementById('encrypt-section').style.display = 'block';
                document.getElementById('decrypt-section').style.display = 'none';
            } else {
                document.getElementById('encrypt-section').style.display = 'none';
                document.getElementById('decrypt-section').style.display = 'block';
            }
            document.getElementById('status-msg').style.display = 'none';
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = `status ${type}`;
        }

        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>

</body>

</html>
