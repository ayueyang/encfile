<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES-CTR 文件加密工具</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-soft: #eef2ff;
            --success: #059669;
            --success-bg: #ecfdf5;
            --error: #dc2626;
            --error-bg: #fef2f2;
            --warning-bg: #fffbeb;
            --warning-text: #92400e;
            --warning-border: #fde68a;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow: 0 4px 24px -8px rgba(15, 23, 42, 0.12), 0 2px 6px -2px rgba(15, 23, 42, 0.04);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 0%, rgba(79, 70, 229, 0.04), transparent 40%),
                              radial-gradient(circle at 80% 100%, rgba(79, 70, 229, 0.03), transparent 40%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 32px 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card);
            padding: 36px 32px;
            border-radius: 14px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 580px;
            border: 1px solid var(--border);
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
            position: relative;
        }

        .github-link {
            position: absolute;
            top: 0;
            right: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.15s;
            background: var(--card);
        }

        .github-link:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .github-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        h1 {
            margin: 0 0 6px 0;
            font-size: 1.35rem;
            color: var(--text);
            font-weight: 650;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .visit-counter {
            display: inline-block;
            color: var(--accent);
            font-size: 0.72rem;
            background: var(--accent-soft);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        @media (max-width: 480px) {
            .github-link {
                width: 30px;
                height: 30px;
                top: -2px;
                right: -2px;
            }

            .github-link svg {
                width: 15px;
                height: 15px;
            }

            h1 {
                font-size: 1.1rem;
                padding-right: 38px;
            }

            .subtitle {
                padding-right: 38px;
            }
        }

        .warning {
            background-color: var(--warning-bg);
            color: var(--warning-text);
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            margin-bottom: 22px;
            border: 1px solid var(--warning-border);
            line-height: 1.55;
        }

        .tabs {
            display: flex;
            margin-bottom: 22px;
            background: var(--border-light);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s ease;
            font-size: 0.88rem;
            user-select: none;
            border-radius: 7px;
        }

        .tab.active {
            color: var(--text);
            background: var(--card);
            box-shadow: var(--shadow-sm);
        }

        .tab:hover:not(.active) {
            color: var(--text);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
            font-size: 0.82rem;
            color: var(--text);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            background: var(--card);
            font-size: 0.88rem;
            transition: all 0.15s;
            font-family: inherit;
            color: var(--text);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .file-input-wrapper {
            position: relative;
            border: 1.5px dashed var(--border);
            border-radius: 10px;
            padding: 24px 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            background: var(--border-light);
        }

        .file-input-wrapper:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        .file-input-text {
            color: var(--text);
            font-size: 0.86rem;
            font-weight: 500;
        }

        .file-input-hint {
            color: var(--text-light);
            font-size: 0.74rem;
            margin-top: 4px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            padding: 10px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.86rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        button.secondary:hover:not(:disabled) {
            background: var(--border-light);
            border-color: var(--text-light);
        }

        button.full {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .mode-info {
            margin-top: 12px;
            padding: 9px 12px;
            border-radius: 7px;
            font-size: 0.76rem;
            line-height: 1.5;
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid rgba(79, 70, 229, 0.1);
        }

        /* 队列样式 */
        .queue-section {
            margin-top: 22px;
            display: none;
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
        }

        .queue-stats {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .queue-list {
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
        }

        .queue-list::-webkit-scrollbar {
            width: 6px;
        }
        .queue-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .queue-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .queue-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }

        .queue-item:last-child {
            border-bottom: none;
        }

        .queue-item-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border-radius: 50%;
            font-weight: 600;
        }

        .queue-item-info {
            flex: 1;
            min-width: 0;
        }

        .queue-item-name {
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.83rem;
        }

        .queue-item-meta {
            color: var(--text-muted);
            font-size: 0.72rem;
            margin-top: 2px;
        }

        .queue-item-progress {
            width: 52px;
            text-align: right;
            font-size: 0.74rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        .queue-item.status-pending .queue-item-icon { color: var(--text-light); background: var(--border-light); }
        .queue-item.status-processing .queue-item-icon { color: var(--accent); background: var(--accent-soft); }
        .queue-item.status-done .queue-item-icon { color: var(--success); background: var(--success-bg); }
        .queue-item.status-error .queue-item-icon { color: var(--error); background: var(--error-bg); }
        .queue-item.status-done .queue-item-name { color: var(--text-muted); }
        .queue-item.status-done { background: rgba(236, 253, 245, 0.4); }

        .queue-item-bar {
            width: 100%;
            height: 3px;
            background: var(--border-light);
            margin-top: 6px;
            border-radius: 2px;
            overflow: hidden;
        }

        .queue-item-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.25s ease;
            border-radius: 2px;
        }

        .queue-item.status-done .queue-item-bar-fill {
            background: var(--success);
            width: 100%;
        }

        .queue-item.status-error .queue-item-bar-fill {
            background: var(--error);
            width: 100%;
        }

        .status {
            margin-top: 14px;
            padding: 10px 13px;
            border-radius: 8px;
            font-size: 0.82rem;
            display: none;
            font-weight: 500;
        }

        .status.success { background: var(--success-bg); color: var(--success); display: block; border: 1px solid rgba(5, 150, 105, 0.15); }
        .status.error { background: var(--error-bg); color: var(--error); display: block; border: 1px solid rgba(220, 38, 38, 0.15); }
        .status.loading { background: var(--accent-soft); color: var(--accent); display: block; border: 1px solid rgba(79, 70, 229, 0.15); }

        #decrypt-section { display: none; }

        .empty-hint {
            padding: 28px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5/js/md5.min.js"></script>
</head>

<body>

    <div class="container">
        <div class="header">
            <a href="https://github.com/ayueyang/encfile" target="_blank" rel="noopener" class="github-link" title="查看 GitHub 源码" aria-label="GitHub 项目地址">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
            <h1>AES-CTR 文件加密工具</h1>
            <div class="subtitle">本地加密 · 文件不上传 · 隐私安全</div>
            <div id="visit-counter" class="visit-counter">访问统计加载中</div>
        </div>

        <div class="warning">
            <strong>注意：</strong> CTR 模式不提供完整性校验。密码错误会生成乱码文件且不报错，请妥善保管密码。
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('encrypt')">加密</div>
            <div class="tab" onclick="switchTab('decrypt')">解密</div>
        </div>

        <!-- 加密区域 -->
        <div id="encrypt-section">
            <div class="form-group">
                <label>选择文件或文件夹</label>
                <div class="file-input-wrapper">
                    <input type="file" id="encrypt-file-input" multiple>
                    <div class="file-input-text">点击选择文件（支持多选）</div>
                    <div class="file-input-hint">或选择文件夹批量处理</div>
                </div>
                <div class="btn-row">
                    <button class="secondary" onclick="selectFolder('encrypt')" style="flex:1">选择文件夹</button>
                    <button class="secondary" onclick="clearFiles('encrypt')" style="flex:1">清空列表</button>
                </div>
            </div>
            <div class="form-group">
                <label>设置密码</label>
                <input type="text" id="encrypt-password" placeholder="建议至少8位字符">
            </div>
            <button class="full" onclick="processEncryption()" id="btn-encrypt">开始加密</button>
            <div id="encrypt-mode-info" class="mode-info"></div>

            <div class="queue-section" id="encrypt-queue-section">
                <div class="queue-header">
                    <span>处理队列</span>
                    <span class="queue-stats" id="encrypt-queue-stats"></span>
                </div>
                <div class="queue-list" id="encrypt-queue-list">
                    <div class="empty-hint">暂无文件</div>
                </div>
            </div>
        </div>

        <!-- 解密区域 -->
        <div id="decrypt-section">
            <div class="form-group">
                <label>选择加密文件</label>
                <div class="file-input-wrapper">
                    <input type="file" id="decrypt-file-input" multiple>
                    <div class="file-input-text">点击选择文件（支持多选）</div>
                    <div class="file-input-hint">或选择文件夹批量处理</div>
                </div>
                <div class="btn-row">
                    <button class="secondary" onclick="selectFolder('decrypt')" style="flex:1">选择文件夹</button>
                    <button class="secondary" onclick="clearFiles('decrypt')" style="flex:1">清空列表</button>
                </div>
            </div>
            <div class="form-group">
                <label>输入密码</label>
                <input type="text" id="decrypt-password" placeholder="输入解密密码">
            </div>
            <button class="full" onclick="processDecryption()" id="btn-decrypt">开始解密</button>
            <div id="decrypt-mode-info" class="mode-info"></div>

            <div class="queue-section" id="decrypt-queue-section">
                <div class="queue-header">
                    <span>处理队列</span>
                    <span class="queue-stats" id="decrypt-queue-stats"></span>
                </div>
                <div class="queue-list" id="decrypt-queue-list">
                    <div class="empty-hint">暂无文件</div>
                </div>
            </div>
        </div>

        <div id="status-msg" class="status"></div>
    </div>

    <!-- 隐藏的文件夹选择输入框 -->
    <input type="file" id="encrypt-folder-input" webkitdirectory multiple style="display:none">
    <input type="file" id="decrypt-folder-input" webkitdirectory multiple style="display:none">

    <script>
        // --- 核心 AES-CTR 逻辑 ---
        function bufferToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function hexToUint8Array(hex) {
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) {
                bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
            }
            return bytes;
        }

        function md5Utils(str) {
            return hexToUint8Array(md5(str + ''));
        }

        // --- 队列管理 ---
        let encryptQueue = [];
        let decryptQueue = [];
        let isProcessing = false;

        function getQueue(mode) {
            return mode === 'encrypt' ? encryptQueue : decryptQueue;
        }

        function setQueue(mode, queue) {
            if (mode === 'encrypt') encryptQueue = queue;
            else decryptQueue = queue;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        function renderQueue(mode) {
            const queue = getQueue(mode);
            const listEl = document.getElementById(mode + '-queue-list');
            const statsEl = document.getElementById(mode + '-queue-stats');
            const sectionEl = document.getElementById(mode + '-queue-section');

            if (queue.length === 0) {
                sectionEl.style.display = 'none';
                return;
            }

            sectionEl.style.display = 'block';

            const pending = queue.filter(f => f.status === 'pending').length;
            const done = queue.filter(f => f.status === 'done').length;
            const error = queue.filter(f => f.status === 'error').length;
            const processing = queue.filter(f => f.status === 'processing').length;
            statsEl.textContent = `共 ${queue.length} 个 · 等待 ${pending} · 完成 ${done} · 失败 ${error}`;

            listEl.innerHTML = queue.map((f, i) => {
                const icon = f.status === 'done' ? '✓' :
                             f.status === 'error' ? '✕' :
                             f.status === 'processing' ? '●' : '○';
                const statusText = f.status === 'done' ? '已完成' :
                                   f.status === 'error' ? '失败: ' + (f.error || '') :
                                   f.status === 'processing' ? (f.progress || 0) + '%' :
                                   '等待中';
                return `
                    <div class="queue-item status-${f.status}">
                        <div class="queue-item-icon">${icon}</div>
                        <div class="queue-item-info">
                            <div class="queue-item-name">${f.name}</div>
                            <div class="queue-item-meta">${formatSize(f.size)} · ${statusText}</div>
                            <div class="queue-item-bar"><div class="queue-item-bar-fill" style="width:${f.progress || 0}%"></div></div>
                        </div>
                        <div class="queue-item-progress">${f.progress || 0}%</div>
                    </div>
                `;
            }).join('');
        }

        function updateQueueItem(mode, index, updates) {
            const queue = getQueue(mode);
            if (queue[index]) {
                Object.assign(queue[index], updates);
                renderQueue(mode);
            }
        }

        // --- 文件选择 ---
        function handleFileSelect(mode, files) {
            const queue = getQueue(mode);
            for (const file of files) {
                queue.push({
                    file: file,
                    name: file.name,
                    size: file.size,
                    status: 'pending',
                    progress: 0,
                    error: ''
                });
            }
            setQueue(mode, queue);
            renderQueue(mode);
        }

        function selectFolder(mode) {
            const input = document.getElementById(mode + '-folder-input');
            input.onchange = function() {
                if (this.files.length) {
                    handleFileSelect(mode, Array.from(this.files));
                }
                this.value = '';
            };
            input.click();
        }

        function clearFiles(mode) {
            setQueue(mode, []);
            renderQueue(mode);
            document.getElementById(mode + '-file-input').value = '';
        }

        // 初始化文件输入监听
        document.getElementById('encrypt-file-input').onchange = function() {
            if (this.files.length) handleFileSelect('encrypt', Array.from(this.files));
        };
        document.getElementById('decrypt-file-input').onchange = function() {
            if (this.files.length) handleFileSelect('decrypt', Array.from(this.files));
        };

        // --- 加密核心 ---
        async function deriveKey(password, sizeSalt) {
            sizeSalt = sizeSalt + '';
            const enc = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]
            );
            const keyLength = 16;
            const passwdBit = await window.crypto.subtle.deriveBits(
                { name: "PBKDF2", salt: enc.encode('AES-CTR'), iterations: 1000, hash: "SHA-256" },
                keyMaterial, keyLength * 8
            );
            const passwdOutward = bufferToHex(passwdBit);
            const passkey = md5Utils(passwdOutward + sizeSalt);
            return await window.crypto.subtle.importKey(
                "raw", passkey, { name: "AES-CTR", length: 128 }, false, ["encrypt", "decrypt"]
            );
        }

        async function readFileAsArrayBuffer(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(blob);
            });
        }

        function incrementIV(nonce, increment) {
            const iv = new DataView(nonce.buffer);
            const MAX_UINT32 = 0xffffffff;
            const incrementBig = ~~(increment / MAX_UINT32);
            const incrementLittle = (increment % MAX_UINT32) - incrementBig;
            let overflow = 0;
            for (let idx = 0; idx < 4; ++idx) {
                let num = iv.getUint32(12 - idx * 4);
                let inc = overflow;
                if (idx === 0) inc += incrementLittle;
                if (idx === 1) inc += incrementBig;
                num += inc;
                const numBig = ~~(num / MAX_UINT32);
                const numLittle = (num % MAX_UINT32) - numBig;
                overflow = numBig;
                iv.setUint32(12 - idx * 4, numLittle);
            }
            return iv.buffer;
        }

        async function encryptChunk(passkey, iv, chunkIndex, fileData) {
            const increment = Math.floor(chunkIndex / 16);
            let nonce = iv;
            if (increment) {
                nonce = incrementIV(iv, increment);
            }
            const encryptedContent = await window.crypto.subtle.encrypt(
                { name: "AES-CTR", counter: nonce, length: 64 },
                passkey, fileData
            );
            return new Uint8Array(encryptedContent);
        }

        function stripEncryptedExtension(filename) {
            const encExts = ['.ctr', '.enc', '.encrypted', '.aes', '.aesctr', '.crypto'];
            const lowerName = filename.toLowerCase();
            for (const ext of encExts) {
                if (lowerName.endsWith(ext)) {
                    const original = filename.slice(0, -ext.length);
                    return original || filename;
                }
            }
            return filename;
        }

        const supportsStreamWrite = typeof window.showSaveFilePicker === 'function';
        const supportsDirPicker = typeof window.showDirectoryPicker === 'function';

        function checkLargeFileInLimitedMode(fileSize, action) {
            if (supportsStreamWrite) return true;
            const GB = 1024 * 1024 * 1024;
            if (fileSize >= 2 * GB) {
                const sizeGB = (fileSize / GB).toFixed(2);
                return confirm(
                    `警告：大文件风险\n\n` +
                    `当前浏览器为受限模式（不支持流式写入）。\n` +
                    `文件大小：${sizeGB} GB\n\n` +
                    `受限模式下，文件 > 2GB 可能导致浏览器崩溃。\n\n` +
                    `建议切换到 Chrome 或 Edge 浏览器。\n\n` +
                    `点击"确定"继续${action}，点击"取消"返回。`
                );
            }
            return true;
        }

        // --- 批量加密 ---
        async function processEncryption() {
            const password = document.getElementById('encrypt-password').value;
            const btn = document.getElementById('btn-encrypt');

            if (encryptQueue.length === 0) return showStatus('请选择文件', 'error');
            if (!password) return showStatus('请输入密码', 'error');
            if (isProcessing) return;

            isProcessing = true;
            btn.disabled = true;
            btn.textContent = '处理中...';

            let dirHandle = null;
            const pendingItems = encryptQueue.filter(f => f.status !== 'done');

            // 多文件时优先选择输出目录，一次授权批量写入
            if (pendingItems.length > 1 && supportsDirPicker) {
                try {
                    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                } catch (e) {
                    if (e.name === 'AbortError') {
                        isProcessing = false;
                        btn.disabled = false;
                        btn.textContent = '开始加密';
                        return;
                    }
                    dirHandle = null;
                }
            }

            try {
                for (let i = 0; i < encryptQueue.length; i++) {
                    const item = encryptQueue[i];
                    if (item.status === 'done') continue;

                    updateQueueItem('encrypt', i, { status: 'processing', progress: 0 });

                    try {
                        if (!checkLargeFileInLimitedMode(item.size, '加密')) {
                            updateQueueItem('encrypt', i, { status: 'error', error: '已取消', progress: 100 });
                            continue;
                        }

                        const passkey = await deriveKey(password, item.size);
                        const nonce = md5Utils(item.size + '');
                        const CHUNK_SIZE = 1024 * 1024 * 10;
                        const totalChunks = Math.ceil(item.size / CHUNK_SIZE);

                        if (supportsStreamWrite) {
                            let writable;
                            if (dirHandle) {
                                // 批量模式：写入已选择的目录
                                const fileHandle = await dirHandle.getFileHandle(item.name + '.ctr', { create: true });
                                writable = await fileHandle.createWritable();
                            } else {
                                // 单文件模式：弹窗选择保存位置
                                const fileHandle = await window.showSaveFilePicker({
                                    suggestedName: item.name + '.ctr',
                                    types: [{ description: 'Encrypted File', accept: { 'application/octet-stream': ['.ctr'] } }]
                                });
                                writable = await fileHandle.createWritable();
                            }

                            for (let j = 0; j < totalChunks; j++) {
                                const start = j * CHUNK_SIZE;
                                const end = Math.min(start + CHUNK_SIZE, item.size);
                                const chunkBuffer = await readFileAsArrayBuffer(item.file.slice(start, end));
                                const encryptedChunk = await encryptChunk(passkey, nonce, start, chunkBuffer);
                                await writable.write(encryptedChunk);
                                const percent = Math.floor(((j + 1) / totalChunks) * 100);
                                updateQueueItem('encrypt', i, { progress: percent });
                            }
                            await writable.close();
                        } else {
                            const chunks = [];
                            for (let j = 0; j < totalChunks; j++) {
                                const start = j * CHUNK_SIZE;
                                const end = Math.min(start + CHUNK_SIZE, item.size);
                                const chunkBuffer = await readFileAsArrayBuffer(item.file.slice(start, end));
                                const encryptedChunk = await encryptChunk(passkey, nonce, start, chunkBuffer);
                                chunks.push(encryptedChunk);
                                const percent = Math.floor(((j + 1) / totalChunks) * 100);
                                updateQueueItem('encrypt', i, { progress: percent });
                            }
                            const blob = new Blob(chunks, { type: "application/octet-stream" });
                            downloadFile(blob, item.name + ".ctr");
                        }

                        updateQueueItem('encrypt', i, { status: 'done', progress: 100 });
                    } catch (e) {
                        console.error(e);
                        const errorMsg = e.name === 'AbortError' ? '已取消' : e.message;
                        updateQueueItem('encrypt', i, { status: 'error', error: errorMsg, progress: 100 });
                    }
                }

                const doneCount = encryptQueue.filter(f => f.status === 'done').length;
                const errorCount = encryptQueue.filter(f => f.status === 'error').length;
                if (errorCount === 0) {
                    showStatus(`全部完成，共加密 ${doneCount} 个文件`, 'success');
                } else {
                    showStatus(`完成 ${doneCount} 个，失败 ${errorCount} 个`, 'error');
                }
            } finally {
                isProcessing = false;
                btn.disabled = false;
                btn.textContent = '开始加密';
            }
        }

        // --- 批量解密 ---
        async function processDecryption() {
            const password = document.getElementById('decrypt-password').value;
            const btn = document.getElementById('btn-decrypt');

            if (decryptQueue.length === 0) return showStatus('请选择文件', 'error');
            if (!password) return showStatus('请输入密码', 'error');
            if (isProcessing) return;

            isProcessing = true;
            btn.disabled = true;
            btn.textContent = '处理中...';

            let dirHandle = null;
            const pendingItems = decryptQueue.filter(f => f.status !== 'done');

            // 多文件时优先选择输出目录，一次授权批量写入
            if (pendingItems.length > 1 && supportsDirPicker) {
                try {
                    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                } catch (e) {
                    if (e.name === 'AbortError') {
                        isProcessing = false;
                        btn.disabled = false;
                        btn.textContent = '开始解密';
                        return;
                    }
                    dirHandle = null;
                }
            }

            try {
                for (let i = 0; i < decryptQueue.length; i++) {
                    const item = decryptQueue[i];
                    if (item.status === 'done') continue;

                    updateQueueItem('decrypt', i, { status: 'processing', progress: 0 });

                    try {
                        if (!checkLargeFileInLimitedMode(item.size, '解密')) {
                            updateQueueItem('decrypt', i, { status: 'error', error: '已取消', progress: 100 });
                            continue;
                        }

                        const key = await deriveKey(password, item.size);
                        const nonce = md5Utils(item.size + '');
                        const CHUNK_SIZE = 1024 * 1024 * 10;
                        const totalChunks = Math.ceil(item.size / CHUNK_SIZE);
                        const originalName = stripEncryptedExtension(item.name);

                        if (supportsStreamWrite) {
                            let writable;
                            if (dirHandle) {
                                // 批量模式：写入已选择的目录
                                const fileHandle = await dirHandle.getFileHandle(originalName, { create: true });
                                writable = await fileHandle.createWritable();
                            } else {
                                // 单文件模式：弹窗选择保存位置
                                const fileHandle = await window.showSaveFilePicker({
                                    suggestedName: originalName,
                                    types: [{ description: 'All Files', accept: { '*/*': [] } }]
                                });
                                writable = await fileHandle.createWritable();
                            }

                            for (let j = 0; j < totalChunks; j++) {
                                const start = j * CHUNK_SIZE;
                                const end = Math.min(start + CHUNK_SIZE, item.size);
                                const chunkBuffer = await readFileAsArrayBuffer(item.file.slice(start, end));
                                const increment = Math.floor(start / 16);
                                let counterNonce = nonce;
                                if (increment) {
                                    counterNonce = new Uint8Array(incrementIV(nonce, increment));
                                }
                                const decryptedChunk = await window.crypto.subtle.decrypt(
                                    { name: "AES-CTR", counter: counterNonce, length: 64 },
                                    key, chunkBuffer
                                );
                                await writable.write(decryptedChunk);
                                const percent = Math.floor(((j + 1) / totalChunks) * 100);
                                updateQueueItem('decrypt', i, { progress: percent });
                            }
                            await writable.close();
                        } else {
                            const chunks = [];
                            for (let j = 0; j < totalChunks; j++) {
                                const start = j * CHUNK_SIZE;
                                const end = Math.min(start + CHUNK_SIZE, item.size);
                                const chunkBuffer = await readFileAsArrayBuffer(item.file.slice(start, end));
                                const increment = Math.floor(start / 16);
                                let counterNonce = nonce;
                                if (increment) {
                                    counterNonce = new Uint8Array(incrementIV(nonce, increment));
                                }
                                const decryptedChunk = await window.crypto.subtle.decrypt(
                                    { name: "AES-CTR", counter: counterNonce, length: 64 },
                                    key, chunkBuffer
                                );
                                chunks.push(decryptedChunk);
                                const percent = Math.floor(((j + 1) / totalChunks) * 100);
                                updateQueueItem('decrypt', i, { progress: percent });
                            }
                            const blob = new Blob(chunks, { type: "application/octet-stream" });
                            downloadFile(blob, originalName);
                        }

                        updateQueueItem('decrypt', i, { status: 'done', progress: 100 });
                    } catch (e) {
                        console.error(e);
                        const errorMsg = e.name === 'AbortError' ? '已取消' : e.message;
                        updateQueueItem('decrypt', i, { status: 'error', error: errorMsg, progress: 100 });
                    }
                }

                const doneCount = decryptQueue.filter(f => f.status === 'done').length;
                const errorCount = decryptQueue.filter(f => f.status === 'error').length;
                if (errorCount === 0) {
                    showStatus(`全部完成，共解密 ${doneCount} 个文件`, 'success');
                } else {
                    showStatus(`完成 ${doneCount} 个，失败 ${errorCount} 个`, 'error');
                }
            } finally {
                isProcessing = false;
                btn.disabled = false;
                btn.textContent = '开始解密';
            }
        }

        // --- 辅助函数 ---
        function switchTab(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${mode}')"]`).classList.add('active');
            document.getElementById('encrypt-section').style.display = mode === 'encrypt' ? 'block' : 'none';
            document.getElementById('decrypt-section').style.display = mode === 'decrypt' ? 'block' : 'none';
            document.getElementById('status-msg').style.display = 'none';
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = `status ${type}`;
        }

        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function initModeInfo() {
            const encInfo = document.getElementById('encrypt-mode-info');
            const decInfo = document.getElementById('decrypt-mode-info');
            if (supportsStreamWrite) {
                const batchHint = supportsDirPicker ? '多文件自动选择输出目录，无需逐个确认。' : '';
                encInfo.textContent = '流式模式：边处理边写入硬盘，内存占用更小，支持大文件。' + batchHint;
                decInfo.textContent = '流式模式：边处理边写入硬盘，内存占用更小，支持大文件。' + batchHint;
            } else {
                encInfo.textContent = '受限模式：不支持流式写入，文件 2-4GB 可能崩溃。建议更换 Chrome/Edge。';
                decInfo.textContent = '受限模式：不支持流式写入，文件 2-4GB 可能崩溃。建议更换 Chrome/Edge。';
                setTimeout(() => {
                    alert(
                        '浏览器兼容性警告\n\n' +
                        '当前浏览器不支持流式写入，文件 2-4GB 可能导致崩溃。\n\n' +
                        '建议更换以下浏览器后使用：\n' +
                        '• Chrome（谷歌）\n' +
                        '• Edge（微软）\n' +
                        '• 其他基于 Chromium 的主流浏览器（含国产浏览器如360、QQ、搜狗等）\n\n' +
                        '苹果系统（iOS/iPadOS）完全不支持流式写入，所有 iOS 浏览器均受此限制。\n\n' +
                        '原因：流式写入依赖 File System Access API，该 API 仅在 Chromium 内核浏览器中可用。' +
                        'iOS 系统强制所有浏览器使用 WebKit 内核，Apple 未实现此 API 且未承诺支持。' +
                        '当前受限模式下将使用内存累积方式处理，小文件（< 1GB）可正常使用。'
                    );
                }, 500);
            }
        }

        initModeInfo();

        async function updateVisitCounter() {
            try {
                const response = await fetch('/api/visits');
                const data = await response.json();
                const counter = document.getElementById('visit-counter');
                if (data.count !== undefined) {
                    counter.innerHTML = '累计总访问：' + data.count + ' 次';
                } else {
                    counter.innerHTML = '访问统计不可用';
                }
            } catch (e) {
                document.getElementById('visit-counter').innerHTML = '访问统计不可用';
            }
        }
        updateVisitCounter();
    </script>
